name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with full history for legacy ref)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make legacy ref available locally
        run: |
          git fetch origin 'refs/heads/legacy/master:refs/remotes/origin/legacy/master' || \
            git fetch origin '+refs/heads/legacy/*:refs/remotes/origin/legacy/*'
          git rev-parse --verify origin/legacy/master

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Snapshot old blog into public/old-blog/
        run: pnpm tsx scripts/snapshot-old-blog.ts

      - name: Build Tier-3 games
        run: pnpm tsx scripts/build-games.ts

      - name: Build site
        run: pnpm --filter site build

      - name: Generate Pagefind index
        run: pnpm --filter site postbuild

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
