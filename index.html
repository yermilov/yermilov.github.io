<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yaroslav Yermilov</title>
<meta name="description" content="Personal site of Yaroslav Yermilov — rebuilding.">
<style>
  :root {
    color-scheme: light dark;
    --fg: #1a1a1a;
    --bg: #fafaf7;
    --muted: #6b6b6b;
    --accent: #c25b00;
    --rule: #e6e2da;
  }
  @media (prefers-color-scheme: dark) {
    :root { --fg: #e8e8e8; --bg: #18181b; --muted: #9a9a9a; --accent: #ff9248; --rule: #2d2d33; }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 2rem;
    font-family: ui-serif, Georgia, "Times New Roman", serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.55;
    font-size: 17px;
  }
  main { max-width: 34rem; }
  h1 {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 1.05rem;
    font-weight: 500;
    margin: 0 0 2rem;
    letter-spacing: -0.01em;
    color: var(--muted);
  }
  h1 .name { color: var(--fg); }
  h1 .blink {
    color: var(--accent);
    animation: blink 1.2s steps(2) infinite;
  }
  p {
    margin: 0 0 1rem;
  }
  p.lede {
    font-size: 1.35rem;
    line-height: 1.4;
    margin-bottom: 1.5rem;
  }
  p.muted { color: var(--muted); font-size: 0.95rem; }
  .links {
    list-style: none;
    padding: 2rem 0 0;
    margin: 2rem 0 0;
    border-top: 1px solid var(--rule);
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 0.9rem;
  }
  .links li { margin: 0; }
  a {
    color: var(--fg);
    text-decoration: none;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 1px;
    transition: color 0.15s;
  }
  a:hover { color: var(--accent); }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<main>
  <h1><span class="name">yermilov</span>@web:~$ <span class="blink">_</span></h1>
  <p class="lede">Rebuilding this site.</p>
  <p class="muted">New writing coming. The old blog (2017) lives on as an archive.</p>
  <ul class="links">
    <li><a href="/old-blog/">old blog →</a></li>
    <li><a href="https://github.com/yermilov">github</a></li>
    <li><a href="https://twitter.com/yermilov17">twitter</a></li>
  </ul>
</main>
</body>
</html>
